name: Publish package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish @ixo/domain.md to npm after every release check passes
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    if: ${{ inputs.publish == true }}
    name: publish @ixo/domain.md
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.10.0
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm publish --workspace @ixo/domain.md --access public --provenance
